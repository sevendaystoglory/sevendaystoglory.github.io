<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>document.documentElement.classList.add('js');</script>
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="64x64" href="{{ '/assets/images/favicon-64.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/favicon-180.png' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% seo %}
    {% feed_meta %}
</head>
<body>
    <div class="page">
        {% include navigation.html %}

        <main class="main-col">
            <div class="container">
                {{ content }}
            </div>
            {% include footer.html %}
        </main>
    </div>

    <script src="/assets/js/copy-code.js"></script>
    <script src="/assets/js/diffusion-reveal.js"></script>
</body>
</html>

<ul class="news-list">
  {% for item in site.data.news %}
    <li class="news-item">
      <span class="news-date">{{ item.date }}</span>
      {% if item.url %}
        <a href="{{ item.url }}" class="news-link">{{ item.text }}</a>
      {% else %}
        <span class="news-link news-text">{{ item.text }}</span>
      {% endif %}
    </li>
  {% endfor %}
</ul>

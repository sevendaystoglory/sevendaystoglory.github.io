<ul class="til-list">
  {% for post in site.posts %}
    {% if post.category == 'til' %}
      <li class="til-item">
        <span class="til-date">{{ post.date | date: "%b %d, %Y" }}</span>
        <a href="{{ post.url | relative_url }}" class="til-link">{{ post.title }}</a>
      </li>
    {% endif %}
  {% endfor %}
</ul>

<div class="project-grid">
  {% for post in site.posts %}
    {% if post.category == 'projects' %}
      <a href="{{ post.url | relative_url }}" class="project-card">
        {% if post.image %}
          <div class="project-card-img">
            <img src="{{ post.image | relative_url }}" alt="{{ post.title }}">
          </div>
        {% endif %}
        <div class="project-card-body">
          <h3 class="project-card-title">{{ post.title }}</h3>
          <p class="project-card-date">{{ post.date | date: "%B %Y" }}</p>
          {% if post.content %}
            <p class="project-card-desc">{{ post.content | strip_html | truncatewords: 26 }}</p>
          {% endif %}
        </div>
      </a>
    {% endif %}
  {% endfor %}
</div>
